<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; font-src data:; connect-src https://nsgxldkaerxcpokidkzt.supabase.co; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
<meta name="referrer" content="no-referrer">
<title>FinLife — Seu dinheiro, organizado</title>
<style>
  :root{
    --brand:#1F6F5C; --brand-dk:#134A3C; --brand-lt:#EAF3F0; --accent:#0E7C86;
    --ink:#1c2529; --muted:#6b7580; --line:#e6ebe9; --bg:#f4f6f5; --card:#ffffff;
    --pos:#1F8A5B; --neg:#D0453B; --warn:#B7791F; --shadow:0 4px 20px rgba(20,60,45,.08);
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#dfe4e2;color:var(--ink);
    display:flex;justify-content:center;align-items:stretch;
  }
  /* moldura tipo celular no desktop; tela cheia no mobile */
  #app{
    width:100%;max-width:430px;background:var(--bg);min-height:100vh;
    display:flex;flex-direction:column;position:relative;box-shadow:0 0 40px rgba(0,0,0,.15);
    overflow:hidden;
  }
  header.topbar{
    background:linear-gradient(160deg,var(--brand),var(--brand-dk));color:#fff;
    padding:18px 20px 20px;position:sticky;top:0;z-index:5;
  }
  .topbar .row{display:flex;align-items:center;justify-content:space-between}
  .brand{font-weight:800;font-size:22px;letter-spacing:-.5px;display:flex;align-items:center;gap:7px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:#8fe3c4;display:inline-block}
  .topbar .hello{opacity:.85;font-size:13px;margin-top:2px}
  .balance-card{margin-top:16px}
  .balance-card .lbl{font-size:12px;opacity:.8;text-transform:uppercase;letter-spacing:.6px}
  .balance-card .val{font-size:32px;font-weight:800;margin-top:2px}
  .balance-card .sub{font-size:12px;opacity:.85;margin-top:4px;display:flex;gap:14px}
  .balance-card .sub b{font-weight:700}
  .eye{background:rgba(255,255,255,.15);border:0;color:#fff;border-radius:9px;width:34px;height:34px;font-size:15px;cursor:pointer}

  main{flex:1;overflow-y:auto;padding:16px 16px 96px}
  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h2.section{font-size:15px;margin:20px 2px 10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  h2.section:first-child{margin-top:4px}

  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
  .stat .t{font-size:12px;color:var(--muted);font-weight:600}
  .stat .v{font-size:20px;font-weight:800;margin-top:4px}
  .stat .v.pos{color:var(--pos)} .stat .v.neg{color:var(--neg)}

  .list-item{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line)}
  .list-item:last-child{border-bottom:0}
  .ic{width:42px;height:42px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--brand-lt)}
  .li-main{flex:1;min-width:0}
  .li-title{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .li-sub{font-size:12px;color:var(--muted);margin-top:1px}
  .li-amt{font-weight:700;font-size:15px;white-space:nowrap}
  .amt-pos{color:var(--pos)} .amt-neg{color:var(--ink)}

  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px}
  .empty .big{font-size:34px;margin-bottom:6px}

  .catbar{height:8px;border-radius:6px;background:var(--line);overflow:hidden;margin-top:6px}
  .catbar > span{display:block;height:100%}
  .catrow{display:flex;justify-content:space-between;font-size:13px;margin-top:12px}
  .catrow .nm{display:flex;align-items:center;gap:8px}
  .swatch{width:12px;height:12px;border-radius:4px;display:inline-block}

  .insight{display:flex;gap:10px;align-items:flex-start;background:var(--brand-lt);border-radius:12px;padding:12px;margin-bottom:8px}
  .insight .em{font-size:18px}
  .insight .tx{font-size:13.5px;line-height:1.45}

  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--brand-lt);color:var(--brand)}

  /* chips de conta/cartao */
  .chip-row{display:flex;gap:10px;overflow-x:auto;padding:2px 0 6px;margin-bottom:4px}
  .acct-chip{flex:none;min-width:150px;border-radius:14px;padding:14px;color:#fff;box-shadow:var(--shadow)}
  .acct-chip .nm{font-size:13px;opacity:.9}
  .acct-chip .bl{font-size:19px;font-weight:800;margin-top:6px}
  .acct-chip .tp{font-size:11px;opacity:.8;margin-top:2px;text-transform:capitalize}

  .cardface{border-radius:16px;padding:16px;color:#fff;box-shadow:var(--shadow);margin-bottom:12px;position:relative;overflow:hidden}
  .cardface::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
  .cardface .nm{font-size:14px;font-weight:700;opacity:.95}
  .cardface .fat{font-size:24px;font-weight:800;margin-top:10px}
  .cardface .meta{display:flex;justify-content:space-between;font-size:11px;opacity:.9;margin-top:12px}
  .progress{height:6px;background:rgba(255,255,255,.25);border-radius:6px;margin-top:8px;overflow:hidden}
  .progress > span{display:block;height:100%;background:#fff}

  /* botoes */
  .btn{border:0;border-radius:12px;padding:13px 16px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
  .btn.primary{background:var(--brand);color:#fff}
  .btn.primary:active{background:var(--brand-dk)}
  .btn.ghost{background:var(--brand-lt);color:var(--brand)}
  .btn.mini{width:auto;padding:8px 14px;font-size:13px;border-radius:10px}
  .btn.danger{background:#fbeae8;color:var(--neg)}

  /* nav inferior */
  nav.tabbar{
    position:absolute;bottom:0;left:0;right:0;height:72px;background:#fff;border-top:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom);z-index:6;
  }
  .tab{background:0;border:0;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:11px;cursor:pointer;flex:1;padding:6px 0}
  .tab .ti{font-size:20px;line-height:1}
  .tab.active{color:var(--brand)}
  .fab{width:56px;height:56px;border-radius:50%;background:var(--brand);color:#fff;border:0;font-size:30px;line-height:1;
    box-shadow:0 6px 16px rgba(31,111,92,.45);cursor:pointer;margin-top:-24px;flex:none}
  .fab:active{background:var(--brand-dk)}

  /* modal */
  .sheet-bg{position:absolute;inset:0;background:rgba(15,30,25,.45);z-index:20;display:none;align-items:flex-end}
  .sheet-bg.open{display:flex}
  .sheet{background:#fff;width:100%;border-radius:22px 22px 0 0;padding:18px 18px 26px;max-height:92%;overflow-y:auto;animation:up .28s ease}
  @keyframes up{from{transform:translateY(100%)}to{transform:none}}
  .sheet h3{margin:2px 0 14px;font-size:19px}
  .grabber{width:44px;height:5px;background:var(--line);border-radius:5px;margin:0 auto 14px}
  label.fld{display:block;font-size:12.5px;color:var(--muted);font-weight:600;margin:12px 2px 5px}
  input,select{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus{outline:0;border-color:var(--brand)}
  .seg{display:flex;background:var(--brand-lt);border-radius:12px;padding:4px;gap:4px}
  .seg button{flex:1;border:0;background:0;padding:10px;border-radius:9px;font-weight:700;font-size:14px;color:var(--muted);cursor:pointer}
  .seg button.on{background:#fff;color:var(--brand);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .catgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
  .catpick{border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:9px 4px;text-align:center;cursor:pointer;font-size:11px;color:var(--muted)}
  .catpick .e{font-size:20px;display:block}
  .catpick.on{border-color:var(--brand);background:var(--brand-lt);color:var(--brand);font-weight:700}
  .hint{font-size:11.5px;color:var(--muted);margin-top:5px}

  /* assistente */
  .chatlog{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
  .bubble{max-width:85%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.45}
  .bubble.user{align-self:flex-end;background:var(--brand);color:#fff;border-bottom-right-radius:5px}
  .bubble.bot{align-self:flex-start;background:#fff;box-shadow:var(--shadow);border-bottom-left-radius:5px}
  .suggest{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .suggest button{border:1px solid var(--line);background:#fff;border-radius:20px;padding:8px 12px;font-size:12.5px;cursor:pointer;color:var(--brand)}
  .chatform{display:flex;gap:8px}
  .chatform input{flex:1}
  .chatform button{flex:none;width:48px;border-radius:12px;background:var(--brand);color:#fff;border:0;font-size:18px;cursor:pointer}

  .more-item{display:flex;align-items:center;gap:12px;padding:15px 4px;border-bottom:1px solid var(--line);cursor:pointer}
  .more-item .ic{background:var(--brand-lt)}
  .toast{position:absolute;bottom:88px;left:50%;transform:translateX(-50%);background:var(--brand-dk);color:#fff;padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;z-index:30;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;bottom:98px}
  .del-x{background:0;border:0;color:var(--muted);font-size:16px;cursor:pointer;padding:6px}

  /* tela de bloqueio */
  #lockScreen{display:none;position:fixed;inset:0;z-index:100;
    background:linear-gradient(165deg,var(--brand),var(--brand-dk));
    align-items:center;justify-content:center;padding:24px}
  .lockbox{background:#fff;border-radius:20px;padding:30px 24px;width:100%;max-width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .lock-ic{font-size:44px}
  .lock-title{font-size:22px;font-weight:800;margin-top:8px;color:var(--ink)}
  .lock-sub{font-size:13.5px;color:var(--muted);margin:6px 0 18px}
  #lockPass{width:100%;padding:14px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;text-align:center}
  #lockPass:focus{outline:0;border-color:var(--brand)}
  .lock-err{color:var(--neg);font-size:13px;min-height:18px;margin:8px 0}
  .lockbox .btn{margin-top:4px}

  /* sidebar e desktop: ocultos por padrão (mobile-first) */
  .sidebar{display:none}
  .bcleft{display:block}
  .content{display:flex;flex-direction:column;flex:1;min-height:100vh;position:relative}

  /* ====================== DESKTOP ====================== */
  @media(min-width:900px){
    body{align-items:flex-start;background:#d3dad7;overflow:hidden}
    #app{max-width:none;width:100%;flex-direction:row;margin:0;height:100vh;overflow:hidden}
    .content{height:100vh;overflow:hidden}
    main{padding:26px 36px 48px}
    nav.tabbar{display:none}

    .sidebar{display:flex;flex-direction:column;width:242px;flex:none;
      background:linear-gradient(185deg,var(--brand-dk),#0d3a2e);color:#fff;padding:24px 16px 18px;position:sticky;top:0;height:100vh}
    .side-brand{font-weight:800;font-size:25px;display:flex;align-items:center;gap:9px;padding:4px 10px 20px}
    .side-brand .dot{width:11px;height:11px;border-radius:50%;background:#8fe3c4;display:inline-block}
    .side-nav{display:flex;flex-direction:column;gap:4px}
    .side-nav .tab{flex:none;flex-direction:row;justify-content:flex-start;gap:13px;color:#cfe3db;font-size:15px;font-weight:600;
      padding:12px 14px;border-radius:11px;width:100%;text-align:left;transition:.15s}
    .side-nav .tab .ti{font-size:19px}
    .side-nav .tab:hover{background:rgba(255,255,255,.09);color:#fff}
    .side-nav .tab.active{background:rgba(255,255,255,.17);color:#fff}
    .side-add{margin-top:16px;background:#fff;color:var(--brand-dk);border:0;border-radius:12px;padding:13px;font-weight:800;font-size:15px;cursor:pointer;transition:.15s}
    .side-add:hover{background:#eafaf3}
    .side-foot{margin-top:auto;font-size:11px;opacity:.55;padding:12px 8px 4px;text-align:center;line-height:1.5}

    /* topbar vira faixa horizontal */
    header.topbar{padding:20px 36px}
    .topbar .brand{display:none}
    .topbar .row{position:absolute;top:20px;right:36px;width:auto}
    .topbar .hello{font-size:14px}
    .topbar .balance-card{margin-top:2px;display:flex;align-items:flex-end;justify-content:space-between;gap:30px}
    .topbar .bcleft{display:block}
    .topbar .balance-card .val{font-size:30px}
    .topbar .balance-card .sub{margin-top:0;font-size:13.5px}

    /* dashboard em 2 colunas — ocupa toda a largura disponível */
    #v-home .dash{display:grid;grid-template-columns:1.05fr .95fr;gap:24px;align-items:start}
    #v-home .dash .col{min-width:0}
    #v-home h2.section:first-child{margin-top:0}

    /* listas/telas: largura confortável, mas usando o espaço da tela */
    #v-tx,#v-cards,#v-more,#v-chat{max-width:960px;margin:0 auto;width:100%}
    #v-cards .cardface{max-width:520px}

    /* modal centralizado como diálogo */
    .sheet-bg{align-items:center;justify-content:center}
    .sheet{max-width:470px;border-radius:20px;max-height:88vh;animation:pop .2s ease}
    @keyframes pop{from{transform:scale(.96);opacity:.5}to{transform:none;opacity:1}}

    main::-webkit-scrollbar{width:10px}
    main::-webkit-scrollbar-thumb{background:#c4d0cb;border-radius:8px}
  }

  /* telas muito largas: em 3 colunas quando há espaço de sobra */
  @media(min-width:1500px){
    #v-home .dash{grid-template-columns:1fr 1fr;gap:28px}
    main{padding:30px 48px 54px}
  }
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="side-brand"><span class="dot"></span>FinLife</div>
    <nav class="side-nav">
      <button class="tab active" data-tab="home"><span class="ti">🏠</span><span>Início</span></button>
      <button class="tab" data-tab="tx"><span class="ti">📄</span><span>Transações</span></button>
      <button class="tab" data-tab="cards"><span class="ti">💳</span><span>Cartões</span></button>
      <button class="tab" data-tab="chat"><span class="ti">🤖</span><span>Assistente</span></button>
      <button class="tab" data-tab="more"><span class="ti">⋯</span><span>Mais</span></button>
    </nav>
    <button class="side-add" onclick="openTxSheet()">＋ Nova transação</button>
    <div class="side-foot">Protótipo web · dados salvos neste navegador</div>
  </aside>

  <div class="content">
  <header class="topbar">
    <div class="row">
      <div>
        <div class="brand"><span class="dot"></span>FinLife</div>
        <div class="hello" id="hello">Olá! 👋</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="syncDot" style="font-size:11px;color:#fff;opacity:0;transition:opacity .3s;white-space:nowrap"></span>
        <button class="eye" id="eyeBtn" title="Mostrar/ocultar valores">👁</button>
      </div>
    </div>
    <div class="balance-card">
      <div class="bcleft">
        <div class="lbl">Saldo consolidado</div>
        <div class="val" id="totalBal">R$ 0,00</div>
      </div>
      <div class="sub">
        <span>Entradas: <b id="mIn">R$ 0</b></span>
        <span>Saídas: <b id="mOut">R$ 0</b></span>
      </div>
    </div>
  </header>

  <main>
    <!-- INÍCIO -->
    <section class="view active" id="v-home"></section>
    <!-- TRANSAÇÕES -->
    <section class="view" id="v-tx"></section>
    <!-- CARTÕES -->
    <section class="view" id="v-cards"></section>
    <!-- MAIS -->
    <section class="view" id="v-more"></section>
    <!-- ASSISTENTE -->
    <section class="view" id="v-chat"></section>
  </main>

  <nav class="tabbar">
    <button class="tab active" data-tab="home"><span class="ti">🏠</span>Início</button>
    <button class="tab" data-tab="tx"><span class="ti">📄</span>Transações</button>
    <button class="fab" id="fab">+</button>
    <button class="tab" data-tab="cards"><span class="ti">💳</span>Cartões</button>
    <button class="tab" data-tab="more"><span class="ti">⋯</span>Mais</button>
  </nav>
  </div>

  <div class="sheet-bg" id="sheetBg"><div class="sheet" id="sheet"></div></div>
  <div class="toast" id="toast"></div>
</div>

<div id="lockScreen">
  <div class="lockbox">
    <div class="lock-ic">🔒</div>
    <div class="lock-title">FinLife bloqueado</div>
    <div class="lock-sub">Digite sua senha para acessar seus dados.</div>
    <input id="lockPass" type="password" placeholder="Senha" autocomplete="current-password">
    <div id="lockErr" class="lock-err"></div>
    <button id="lockBtn" class="btn primary">Desbloquear</button>
  </div>
</div>

<script>
/* ====================== ESTADO ====================== */
const LS_KEY = "finly_v2";
const CATS = {
  alimentacao:{nome:"Alimentação",e:"🍔",cor:"#E8663D",kw:["mercado","supermercado","ifood","restaurante","lanche","padaria","comida","pizza","hamburg","cafe","açougue","hortifruti"]},
  transporte:{nome:"Transporte",e:"🚗",cor:"#3E6FB0",kw:["uber","99","gasolina","combustivel","combustível","onibus","ônibus","metro","metrô","posto","estacionamento","pedagio"]},
  moradia:{nome:"Moradia",e:"🏠",cor:"#7C5CBF",kw:["aluguel","luz","agua","água","condominio","condomínio","internet","energia","gas","gás","iptu"]},
  saude:{nome:"Saúde",e:"💊",cor:"#2AA79B",kw:["farmacia","farmácia","medico","médico","plano","hospital","dentista","academia","exame","remedio","remédio"]},
  lazer:{nome:"Lazer",e:"🎮",cor:"#D6467F",kw:["cinema","netflix","spotify","jogo","bar","show","viagem","hotel","disney","prime","hbo","balada"]},
  compras:{nome:"Compras",e:"🛍️",cor:"#C9962B",kw:["loja","roupa","amazon","shopping","magalu","mercadolivre","calcado","calçado","eletronico","eletrônico","presente"]},
  educacao:{nome:"Educação",e:"📚",cor:"#4C8C4A",kw:["curso","escola","faculdade","livro","udemy","alura","mensalidade"]},
  salario:{nome:"Salário / Renda",e:"💰",cor:"#1F8A5B",kw:["salario","salário","pagamento","freela","freelance","rendimento","pix recebido","deposito","depósito","transferencia recebida"],receita:true},
  outros:{nome:"Outros",e:"📦",cor:"#6b7580",kw:[]}
};
const ACCENT_COLORS = ["#1F6F5C","#0E7C86","#3E6FB0","#7C5CBF","#C9962B","#D6467F","#E8663D"];

let S = emptyState();     // preenchido por init()
let hideValues = false;

/* ---- Segurança: criptografia local opcional (Web Crypto / AES-GCM) ---- */
const SUB = (window.crypto && crypto.subtle) ? crypto.subtle : null;
let cryptoKey = null;     // chave AES em memória durante a sessão
let encSalt = null;       // salt (Uint8Array), guardado no envelope
let encEnabled = false;   // true quando os dados estão criptografados

function emptyState(){ return {nome:"",accounts:[],cards:[],tx:[],recur:[]}; }
function abToB64(buf){ const b=new Uint8Array(buf); let s=""; for(let i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
function b64ToU8(str){ const s=atob(str); const u=new Uint8Array(s.length); for(let i=0;i<s.length;i++) u[i]=s.charCodeAt(i); return u; }
async function deriveKey(pass, salt){
  const base = await SUB.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  return SUB.deriveKey({name:"PBKDF2", salt, iterations:150000, hash:"SHA-256"}, base,
    {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
}
async function encryptEnvelope(){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await SUB.encrypt({name:"AES-GCM", iv}, cryptoKey, new TextEncoder().encode(JSON.stringify(S)));
  return {__enc:1, salt:abToB64(encSalt), iv:abToB64(iv), ct:abToB64(ct)};
}
async function decryptEnvelope(env, key){
  const pt = await SUB.decrypt({name:"AES-GCM", iv:b64ToU8(env.iv)}, key, b64ToU8(env.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
function cacheLocal(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){} }
function save(){

  try{
    const r=await supa("/auth/v1/token?grant_type=refresh_token",{method:"POST",body:JSON.stringify({refresh_token:session.refresh_token})});

async function cloudPull(){

async function init(){
  // tenta restaurar sessão da nuvem
  try{ const raw=localStorage.getItem(SESS_KEY); if(raw) session=JSON.parse(raw); }catch(e){}
  if(session){
    S=loadLocalCache(); afterUnlock();          // mostra o cache local já (rápido/offline)
    syncStatus("sync");
    const remote=await cloudPull();
    if(remote && remote.data){ S=remote.data; if(!S.recur)S.recur=[]; cacheLocal(); renderAll(); syncStatus("ok"); }
    else if(remote && remote.data===null){ await cloudPush(); syncStatus("ok"); } // nuvem vazia: sobe o local
    else { syncStatus("err"); }                  // offline: segue com cache
    return;
  }
  // modo local (sem nuvem) — com possível cadeado de criptografia
  let raw=null; try{ raw=localStorage.getItem(LS_KEY); }catch(e){}
  if(!raw){ S=emptyState(); afterUnlock(); return; }
  let parsed; try{ parsed=JSON.parse(raw); }catch(e){ S=emptyState(); afterUnlock(); return; }
  if(parsed && parsed.__enc){ encEnabled=true; encSalt=b64ToU8(parsed.salt); showLock(parsed); }
  else { if(!parsed.recur) parsed.recur=[]; S=parsed; encEnabled=false; afterUnlock(); }
}

/* ====================== RECORRÊNCIAS ====================== */
function addPeriod(iso, per){
  const d=new Date(iso+"T00:00:00");
  if(per==="mensal") d.setMonth(d.getMonth()+1);
  else if(per==="semanal") d.setDate(d.getDate()+7);
  else if(per==="anual") d.setFullYear(d.getFullYear()+1);
  return d.toISOString().slice(0,10);
}
function perLabel(per){ return {mensal:"mensal",semanal:"semanal",anual:"anual"}[per]||per; }
// gera as ocorrências vencidas (do início até hoje) de cada recorrência ativa
function materializeRecurrences(){
  const today=new Date().toISOString().slice(0,10);
  let changed=false;
  (S.recur||[]).forEach(r=>{
    if(!r.ativo) return;
    let next = r.lastRun ? addPeriod(r.lastRun, r.periodicidade) : r.startDate;
    let guard=0;
    while(next<=today && guard<1000){
      S.tx.push({id:txid(),tipo:r.tipo,valor:r.valor,desc:r.desc,cat:r.cat,src:r.src,
        date:next,comp:next.slice(0,7),recId:r.id,recPer:r.periodicidade});
      r.lastRun=next; changed=true;
      next=addPeriod(next, r.periodicidade); guard++;
    }
  });
  if(changed) save();
}

function parseMoney(str){
  if(str==null) return NaN;
  str=(""+str).trim().replace(/[^\d.,-]/g,"");
  if(str.indexOf(",")>-1){ str=str.replace(/\./g,"").replace(",","."); }
  return parseFloat(str);
}
function autoCat(desc,tipo){
  const d=(desc||"").toLowerCase();
  for(const k in CATS){ if(CATS[k].kw.some(w=>d.includes(w))) return k; }
  return tipo==="receita"?"salario":"outros";
}
function accountBalance(accId){
  const acc = S.accounts.find(a=>a.id===accId); if(!acc) return 0;
  let bal = acc.saldoInicial;
  S.tx.forEach(t=>{
    if(t.src!==accId) return;
    if(t.tipo==="receita") bal+=t.valor;
    else if(t.tipo==="despesa") bal-=t.valor;
    else if(t.tipo==="transf-out") bal-=t.valor;
    else if(t.tipo==="transf-in") bal+=t.valor;
  });
  return bal;
}

/* ====================== INSIGHTS ====================== */
function expenseByCat(ym){
  const map={}; let total=0;
  monthTx(ym).filter(t=>t.tipo==="despesa").forEach(t=>{ map[t.cat]=(map[t.cat]||0)+t.valor; total+=t.valor; });
  const rows=Object.entries(map).map(([cat,val])=>({cat,val})).sort((a,b)=>b.val-a.val);
  return {rows,total};
}
function buildInsights(ym){
  const out=[]; const cur=expenseByCat(ym);
  // maior categoria
  if(cur.rows.length){ const top=cur.rows[0]; const pct=Math.round(top.val/cur.total*100);
    out.push({e:CATS[top.cat].e,t:`Sua maior despesa em ${monthName(ym)} é <b>${CATS[top.cat].nome}</b>: ${fmt(top.val)} (${pct}% do total).`});
  }
  // comparacao mes anterior
  const prev=prevYM(ym); const pe=monthExpense(prev), ce=monthExpense(ym);
  if(pe>0){ const diff=Math.round((ce-pe)/pe*100);
    if(Math.abs(diff)>=5) out.push({e:diff>0?"📈":"📉",t:`Seus gastos estão <b>${Math.abs(diff)}% ${diff>0?"maiores":"menores"}</b> que em ${monthName(prev)}.`});
  }
  // resultado
  const res=monthIncome(ym)-ce;
  if(res>0) out.push({e:"✅",t:`Você está no <b>positivo</b> este mês: sobrou ${fmt(res)} até agora.`});
  else if(res<0) out.push({e:"⚠️",t:`Atenção: você gastou <b>${fmt(-res)} a mais</b> do que recebeu este mês.`});
  // faturas
  let totFat=0; S.cards.forEach(c=>totFat+=cardInvoice(c.id,ym));
  if(totFat>0) out.push({e:"💳",t:`Faturas de cartão em aberto somam <b>${fmt(totFat)}</b>.`});
  return out.slice(0,4);
}

function saveTx(){
  const val=parseMoney(document.getElementById("txVal").value);
  if(!val||val<=0){ toast("Informe um valor válido"); return; }
  const desc=document.getElementById("txDesc").value.trim();
  const date=document.getElementById("txDate").value||new Date().toISOString().slice(0,10);
  if(txForm.tipo==="transf"){
    const from=document.getElementById("txFrom").value, to=document.getElementById("txTo").value;
    if(from===to){ toast("Escolha contas diferentes"); return; }
    S.tx.push({id:txid(),tipo:"transf-out",valor:val,desc:desc||"Transferência",cat:"outros",src:from,date,comp:date.slice(0,7),pair:to});
    S.tx.push({id:txid(),tipo:"transf-in",valor:val,desc:desc||"Transferência",cat:"outros",src:to,date,comp:date.slice(0,7),pair:from});
    toast("Transferência registrada ✅"); closeSheet(); renderAll(); return;
  }
  const src=document.getElementById("txSrc").value;
  const cat = txForm.tipo==="receita" && txForm.cat==="outros" ? "salario" : txForm.cat;
  const rep=(document.getElementById("txRep")||{}).value||"nao";

  if(rep!=="nao"){
    // cria uma regra de recorrência; as ocorrências são geradas automaticamente
    const rule={id:"r"+txid(),tipo:txForm.tipo,valor:val,desc:desc||CATS[cat].nome,cat,src,
      periodicidade:rep,startDate:date,lastRun:null,ativo:true};
    S.recur.push(rule);
    materializeRecurrences();
    closeSheet(); renderAll();
    toast(`Recorrência ${perLabel(rep)} criada 🔁`);
    return;
  }

  if(txForm.tipo==="despesa" && isCard(src)){
    const parc=parseInt(document.getElementById("txParc").value||"1");
    const each=Math.round((val/parc)*100)/100;
    const base=new Date(date);
    for(let i=0;i<parc;i++){ const d=new Date(base); d.setMonth(d.getMonth()+i);
      S.tx.push({id:txid(),tipo:"despesa",valor:each,desc:desc||CATS[cat].nome,cat,src,date:d.toISOString().slice(0,10),comp:d.toISOString().slice(0,7),parcAtual:i+1,parcTotal:parc}); }
    toast(parc>1?`Compra em ${parc}x registrada ✅`:"Despesa registrada ✅");
  } else {
    S.tx.push({id:txid(),tipo:txForm.tipo,valor:val,desc:desc||CATS[cat].nome,cat,src,date,comp:date.slice(0,7)});
    toast(txForm.tipo==="receita"?"Receita registrada ✅":"Despesa registrada ✅");
  }
  closeSheet(); renderAll();
}
function delTx(id){
  const t=S.tx.find(x=>x.id===id); if(!t)return;
  if(t.recId){
    const all=confirm("Esta é uma transação recorrente 🔁\n\nOK = parar a recorrência e remover TODAS as ocorrências.\nCancelar = excluir apenas esta.");
    if(all){
      S.tx=S.tx.filter(x=>x.recId!==t.recId);
      S.recur=(S.recur||[]).filter(r=>r.id!==t.recId);
      renderAll(); toast("Recorrência removida"); return;
    }
  }
  S.tx=S.tx.filter(x=>x.id!==id);
  if(t.pair){ // remove par de transferencia
    const partner=S.tx.find(x=>x.pair===t.src && x.date===t.date && x.valor===t.valor);
    if(partner) S.tx=S.tx.filter(x=>x.id!==partner.id);
  }
  renderAll(); toast("Transação excluída");
}
function stopRecurrence(rid){
  if(!confirm("Parar esta recorrência? As ocorrências já lançadas continuam; nenhuma nova será criada.")) return;
  const r=(S.recur||[]).find(x=>x.id===rid); if(r) r.ativo=false;
  renderAll(); toast("Recorrência pausada");
}

  const p1=document.getElementById("secP1").value, p2=document.getElementById("secP2").value;
  if(!p1||p1.length<4){ toast("Use ao menos 4 caracteres"); return; }
  if(p1!==p2){ toast("As senhas não conferem"); return; }
  try{
    encSalt=crypto.getRandomValues(new Uint8Array(16));
    cryptoKey=await deriveKey(p1, encSalt);
    encEnabled=true; save();
    closeSheet(); renderAll(); toast("Proteção ativada 🔒");
  }catch(e){ toast("Não foi possível ativar 😕"); }
}
async function disableSecurity(){
  if(!confirm("Desativar a proteção? Seus dados voltarão a ficar SEM criptografia neste navegador.")) return;
  encEnabled=false; cryptoKey=null; encSalt=null;
  try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){}
  closeSheet(); renderAll(); toast("Proteção desativada");
}

/* ---- CONTA NA NUVEM (sincronização entre aparelhos) ---- */
function openCloudSheet(){
  if(session){
    openSheet(`<h3>☁️ Conta na nuvem</h3>
      <p style="color:var(--muted);font-size:14px">Conectada como <b>${esc(session.email||"")}</b>.<br>Seus dados sincronizam automaticamente entre os aparelhos com esta conta.</p>
      <button class="btn ghost" onclick="syncNow()">↻ Sincronizar agora</button>
      <button class="btn danger" style="margin-top:10px" onclick="doCloudLogout()">Sair desta conta (neste aparelho)</button>
      <button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Fechar</button>`);
    return;
  }
  openSheet(`<h3>☁️ Sincronizar entre aparelhos</h3>
    <p style="color:var(--muted);font-size:13px;line-height:1.5">Crie uma conta (ou entre) com <b>e-mail e senha</b>. Use a <b>mesma conta</b> no PC e no celular para os dados ficarem iguais e atualizarem sozinhos.</p>
    <label class="fld">E-mail</label><input id="cloudEmail" type="email" autocomplete="email" placeholder="voce@email.com">
    <label class="fld">Senha</label><input id="cloudPass" type="password" autocomplete="current-password" placeholder="mínimo 6 caracteres">
    <button class="btn primary" style="margin-top:16px" onclick="doCloudLogin()">Entrar</button>
    <button class="btn ghost" style="margin-top:10px" onclick="doCloudSignup()">Criar conta nova</button>
    <div class="hint" style="margin-top:12px">🔒 A conexão é segura (HTTPS) e cada conta só acessa os próprios dados. Faça um backup (Exportar) antes da 1ª sincronização.</div>`);
}
function cloudInputs(){ return { email:(document.getElementById("cloudEmail").value||"").trim(), pass:document.getElementById("cloudPass").value||"" }; }
async function doCloudSignup(){
  const {email,pass}=cloudInputs();
  if(!email||pass.length<6){ toast("E-mail válido e senha de 6+ caracteres"); return; }
  toast("Criando conta…");
  try{
    const j=await authSignup(email,pass);
    if(j.access_token){ setSession(j); await afterCloudConnect(true); toast("Conta criada e conectada ☁️"); }
    else { toast("Conta criada! Confirme o e-mail e depois entre."); }
  }catch(e){ toast(e.message||"Não foi possível criar"); }
}
async function doCloudLogin(){
  const {email,pass}=cloudInputs();
  if(!email||!pass){ toast("Preencha e-mail e senha"); return; }
  toast("Entrando…");
  try{
    const j=await authLogin(email,pass);
    setSession(j); await afterCloudConnect(false); toast("Conectada à nuvem ☁️");
  }catch(e){ toast(e.message||"E-mail ou senha inválidos"); }
}
async function afterCloudConnect(isNew){
  // ao conectar, desliga o cadeado local (a conta passa a proteger)
  encEnabled=false; cryptoKey=null; encSalt=null;
  const remote=await cloudPull();
  if(remote && remote.data){
    // já existe dado na nuvem: pergunta se sobrescreve o local
    if((S.accounts.length||S.tx.length) && confirm("Já existem dados nesta conta na nuvem.\n\nOK = usar os dados DA NUVEM (recomendado).\nCancelar = enviar os dados DESTE aparelho para a nuvem.")){
      S=remote.data; if(!S.recur)S.recur=[]; cacheLocal();
    } else if(!(S.accounts.length||S.tx.length)){
      S=remote.data; if(!S.recur)S.recur=[]; cacheLocal();
    } else {
      await cloudPush();
    }
  } else {
    await cloudPush(); // nuvem vazia: sobe o que tem
  }
  closeSheet(); renderAll(); syncStatus("ok");
}
async function doCloudLogout(){
  if(!confirm("Sair da conta neste aparelho? Os dados continuam salvos na nuvem; este aparelho volta ao modo local.")) return;
  clearSession(); closeSheet(); renderAll(); toast("Desconectada da nuvem");
}
async function syncNow(){
  syncStatus("sync");
  const remote=await cloudPull();
  if(remote && remote.data){ S=remote.data; if(!S.recur)S.recur=[]; cacheLocal(); renderAll(); syncStatus("ok"); toast("Sincronizado ☁️"); }
  else if(remote && remote.data===null){ await cloudPush(); syncStatus("ok"); toast("Enviado para a nuvem ☁️"); }
  else { syncStatus("err"); toast("Sem conexão agora"); }
}

/* ====================== ASSISTENTE ====================== */
let chatHist=[];
function renderChat(){
  const sug=["Quanto gastei este mês?","Gastos com alimentação","Qual meu saldo total?","Maior gasto do mês","Fatura dos cartões"];
  let h=`<h2 class="section">🤖 Assistente FinLife</h2>
    <div class="chatlog" id="chatlog"></div>
    <div class="suggest">${sug.map(s=>`<button onclick="ask('${s}')">${s}</button>`).join("")}</div>
    <form class="chatform" onsubmit="event.preventDefault();askInput()">
      <input id="chatInput" placeholder="Pergunte sobre suas finanças...">
      <button type="submit">➤</button>
    </form>`;
  document.getElementById("v-chat").innerHTML=h;
  drawChat();
  if(chatHist.length===0){ botSay("Oi! Sou seu assistente. Posso responder sobre seus gastos, saldo e faturas. Experimente uma das sugestões abaixo 👇"); }
}
function drawChat(){
  const el=document.getElementById("chatlog"); if(!el)return;
  el.innerHTML=chatHist.map(m=>`<div class="bubble ${m.who}">${m.text}</div>`).join("");
  el.scrollTop=el.scrollHeight;
}
function botSay(t){ chatHist.push({who:"bot",text:t}); drawChat(); }
function userSay(t){ chatHist.push({who:"user",text:esc(t)}); drawChat(); }
function askInput(){ const i=document.getElementById("chatInput"); if(i.value.trim()){ ask(i.value.trim()); i.value=""; } }
function ask(q){ userSay(q); setTimeout(()=>botSay(answer(q)),250); }
function answer(qRaw){
  const q=qRaw.toLowerCase(); const ym=curYM();
  // categoria específica
  for(const k in CATS){
    if(q.includes(k) || q.includes(CATS[k].nome.toLowerCase().split(" ")[0])){
      if(CATS[k].receita) continue;
      const v=monthTx(ym).filter(t=>t.tipo==="despesa"&&t.cat===k).reduce((s,t)=>s+t.valor,0);
      const tot=monthExpense(ym); const pct=tot?Math.round(v/tot*100):0;
      return v>0? `Em ${monthName(ym)} você gastou <b>${fmt(v)}</b> com ${CATS[k].e} ${CATS[k].nome} — ${pct}% das suas despesas do mês.`
                : `Não encontrei gastos com ${CATS[k].nome} em ${monthName(ym)}.`;
    }
  }
  if((q.includes("saldo")||q.includes("tenho")||q.includes("patrim"))){
    let d=`Seu saldo consolidado é <b>${fmt(totalBalance())}</b>.<br>`;
    d+=S.accounts.map(a=>`• ${esc(a.nome)}: ${fmt(accountBalance(a.id))}`).join("<br>");
    return d;
  }
  if(q.includes("fatura")||q.includes("cart")){
    if(!S.cards.length) return "Você ainda não cadastrou cartões.";
    let tot=0; const lines=S.cards.map(c=>{const f=cardInvoice(c.id,ym);tot+=f;return `• ${esc(c.nome)}: ${fmt(f)} (vence dia ${c.vencimento})`;});
    return `Faturas de ${monthName(ym)}:<br>${lines.join("<br>")}<br><b>Total: ${fmt(tot)}</b>`;
  }
  if(q.includes("maior")){
    const bc=expenseByCat(ym); if(!bc.rows.length) return "Sem despesas registradas neste mês.";
    const top=bc.rows[0]; return `Seu maior gasto em ${monthName(ym)} é <b>${CATS[top.cat].nome}</b>: ${fmt(top.val)}.`;
  }
  if(q.includes("receb")||q.includes("entrada")||q.includes("renda")||q.includes("ganhei")){
    return `Você recebeu <b>${fmt(monthIncome(ym))}</b> em ${monthName(ym)}.`;
  }
  if(q.includes("sobr")||q.includes("result")||q.includes("economi")){
    const r=monthIncome(ym)-monthExpense(ym);
    return r>=0?`Este mês sobrou <b>${fmt(r)}</b> (receitas menos despesas). 👏`:`Este mês você está negativo em <b>${fmt(-r)}</b>. ⚠️`;
  }
  if(q.includes("gast")||q.includes("despes")||q.includes("quanto")){
    return `Em ${monthName(ym)} suas despesas somam <b>${fmt(monthExpense(ym))}</b> e receitas <b>${fmt(monthIncome(ym))}</b>.`;
  }
  if(q.includes("oi")||q.includes("ola")||q.includes("olá")) return "Oi! 😊 Pergunte sobre seus gastos, saldo ou faturas.";
  return "Posso ajudar com: saldo, gastos do mês, gastos por categoria (ex: “alimentação”), faturas de cartão e maior despesa. Tente reformular a pergunta 🙂";
}

/* ====================== UTIL VISUAL ====================== */
function tipoLabel(t){ return {corrente:"Conta corrente",carteira:"Carteira",poupanca:"Poupança"}[t]||t; }
function dateLabel(iso){ const [y,m,d]=iso.split("-"); const now=new Date().toISOString().slice(0,10);
  if(iso===now) return "Hoje"; const dd=new Date(); dd.setDate(dd.getDate()-1);
  if(iso===dd.toISOString().slice(0,10)) return "Ontem"; return `${d}/${m}`; }
function monthName(ym){ const [y,m]=ym.split("-"); return ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"][+m-1]+"/"+y.slice(2); }
function prevYM(ym){ const [y,m]=ym.split("-").map(Number); const d=new Date(y,m-2,1); return d.toISOString().slice(0,7); }
function shade(hex,pct){ // escurece/clareia
  const n=parseInt(hex.slice(1),16); let r=(n>>16)+pct*2.55, g=((n>>8)&255)+pct*2.55, b=(n&255)+pct*2.55;
  r=Math.max(0,Math.min(255,r|0));g=Math.max(0,Math.min(255,g|0));b=Math.max(0,Math.min(255,b|0));
  return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1900); }

/* ====================== NAVEGAÇÃO ====================== */
function go(tab){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("v-"+tab).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===tab));
  if(tab==="chat") renderChat();
  document.querySelector("main").scrollTop=0;
}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>go(t.dataset.tab));
document.getElementById("fab").onclick=openTxSheet;
document.getElementById("eyeBtn").onclick=()=>{ hideValues=!hideValues; document.getElementById("eyeBtn").textContent=hideValues?"🙈":"👁"; renderAll(); };

/* ====================== DADOS ====================== */
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="finlife-backup.json"; a.click(); URL.revokeObjectURL(url);
  toast("Backup exportado 📤");
}
function importData(){
  const inp=document.createElement("input");
  inp.type="file"; inp.accept="application/json,.json";
  inp.onchange=()=>{
    const file=inp.files&&inp.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=()=>{
      let data;
      try{ data=JSON.parse(reader.result); }
      catch(e){ toast("Não consegui ler o arquivo ❌"); return; }
      if(!data || !Array.isArray(data.accounts) || !Array.isArray(data.tx)){
        toast("Arquivo de backup inválido ❌"); return;
      }
      const resumo=`${data.accounts.length} conta(s), ${(data.cards||[]).length} cartão(ões), ${data.tx.length} transação(ões)`;
      if(!confirm(`Importar este backup?\n(${resumo})\n\nISSO SUBSTITUI os dados atuais deste aparelho.`)) return;
      S={ nome:data.nome||"", accounts:data.accounts||[], cards:data.cards||[], tx:data.tx||[], recur:data.recur||[] };
      save(); materializeRecurrences(); renderAll(); go("home");
      toast("Backup importado ✅");
    };
    reader.readAsText(file);
  };
  inp.click();
}
function resetData(){ if(confirm("Isso apaga tudo e recarrega os dados de exemplo. Continuar?")){ S=seed(); save(); renderAll(); go("home"); toast("Exemplo recarregado"); } }
function startEmpty(){
  if(!confirm("Começar do zero com seus próprios dados? Os dados de exemplo serão apagados.")) return;
  const nome=S.nome||"";
  S={nome,accounts:[],cards:[],tx:[],recur:[]};
  save(); renderAll(); go("home");
  toast("Tudo limpo ✨ Vamos criar sua 1ª conta");
  setTimeout(openAccountSheet,600);
}

let focusBusy=false;
window.addEventListener("focus", async ()=>{
  if(!session || focusBusy) return;
  focusBusy=true;
  try{
    const remote=await cloudPull();
    if(remote && remote.data && JSON.stringify(remote.data)!==JSON.stringify(S)){
      S=remote.data; if(!S.recur)S.recur=[]; cacheLocal(); renderAll(); syncStatus("ok");
    }
  }finally{ focusBusy=false; }
});
